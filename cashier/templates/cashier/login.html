{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول | VetCash Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --brand: #2563eb;
      --brand-2: #14b8a6;
      --dark: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --card: rgba(255, 255, 255, .92);
      --shadow: 0 25px 70px rgba(15, 23, 42, .14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Tajawal', 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(37, 99, 235, .18), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(20, 184, 166, .18), transparent 32%),
        linear-gradient(135deg, #f8fbff 0%, #eef7ff 48%, #f7fffc 100%);
      color: var(--dark);
    }

    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .login-page::before,
    .login-page::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      filter: blur(8px);
      opacity: .35;
      z-index: 0;
    }

    .login-page::before {
      background: #bfdbfe;
      top: -80px;
      right: -80px;
    }

    .login-page::after {
      background: #99f6e4;
      bottom: -90px;
      left: -90px;
    }

    .login-container {
      width: min(460px, 94vw);
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(226, 232, 240, .95);
      border-radius: 32px;
      padding: 34px;
      box-shadow: var(--shadow);
    }

    .login-brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .login-logo {
      width: 78px;
      height: 78px;
      margin: 0 auto 16px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 36px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 18px 40px rgba(37, 99, 235, .28);
    }

    .login-brand h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 900;
      color: var(--dark);
    }

    .login-brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
    }

    .login-title {
      margin-bottom: 24px;
      text-align: center;
    }

    .login-title h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
    }

    .login-title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .form-label {
      font-weight: 800;
      margin-bottom: 8px;
      color: #334155;
    }

    .input-icon {
      position: relative;
    }

    .input-icon i {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 18px;
      z-index: 2;
    }

    .input-icon .form-control {
      height: 54px;
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 12px 46px 12px 16px;
      font-weight: 700;
      background: #fff;
      transition: .2s ease;
    }

    .input-icon .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 .22rem rgba(37, 99, 235, .12);
    }

    .alert {
      border: 0;
      border-radius: 16px;
      font-weight: 700;
      padding: 12px 14px;
    }

    .login-btn {
      height: 54px;
      border: 0;
      border-radius: 18px;
      font-weight: 900;
      font-size: 16px;
      background: linear-gradient(135deg, var(--brand), #1d4ed8);
      box-shadow: 0 14px 30px rgba(37, 99, 235, .26);
      transition: .2s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(37, 99, 235, .32);
    }

    .login-footer {
      text-align: center;
      margin-top: 22px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    @media (max-width: 576px) {
      .login-card {
        padding: 26px 20px;
        border-radius: 26px;
      }

      .login-logo {
        width: 66px;
        height: 66px;
        font-size: 30px;
        border-radius: 22px;
      }

      .login-brand h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <main class="login-page">
    <div class="login-container">

      <div class="login-card">

        <div class="login-brand">
          <div class="login-logo">
            <i class="bi bi-heart-pulse"></i>
          </div>
          <h1>VetCash Pro</h1>
          <p>نظام كاشير العيادة البيطرية</p>
        </div>

        <div class="login-title">
          <h2>تسجيل الدخول</h2>
          <p>أدخل بياناتك للوصول إلى لوحة التحكم</p>
        </div>

    {% if error %}
  <div class="alert alert-danger mb-3">
    <i class="bi bi-exclamation-circle ms-1"></i>
    {{ error }}
  </div>
{% endif %}
        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">اسم المستخدم</label>
            <div class="input-icon">
              <i class="bi bi-person"></i>
              <input 
                type="text" 
                name="username" 
                class="form-control" 
                placeholder="أدخل اسم المستخدم"
                required>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">كلمة المرور</label>
            <div class="input-icon">
              <i class="bi bi-lock"></i>
              <input 
                type="password" 
                name="password" 
                class="form-control" 
                placeholder="أدخل كلمة المرور"
                required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 login-btn">
            <i class="bi bi-box-arrow-in-left ms-1"></i>
            دخول إلى النظام
          </button>
        </form>

        <div class="login-footer">
          جميع الحقوق محفوظة © Cashier Pet Pro
        </div>

      </div>

    </div>
  </main>

</body>
</html>
